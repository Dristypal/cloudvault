<!DOCTYPE html>
<html>
<head>
    <title>CloudVault</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- SF Pro-like clean font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f7;
        }

        .container {
            width: 360px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .logo {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: #6e6e73;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            font-size: 13px;
            color: #6e6e73;
            display: block;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #d2d2d7;
            font-size: 14px;
            outline: none;
            transition: 0.2s ease;
        }

        .input-group input:focus {
            border-color: #0071e3;
            box-shadow: 0 0 0 3px rgba(0,113,227,0.15);
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: #0071e3;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            background: #005bb5;
        }

        .footer {
            margin-top: 20px;
            font-size: 13px;
            color: #6e6e73;
        }

        .footer a {
            color: #0071e3;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="container">
    <div class="logo">CloudVault</div>
    <div class="subtitle">Sign in to your secure cloud</div>

    <form method="POST">

        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit">Continue</button>

    </form>

    <div class="footer">
        Don’t have an account? <a href="/register">Create Account</a>
    </div>
</div>

</body>
</html>
